services:
  db:
    image: postgres:15-alpine
    container_name: smart-expense-tracker-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: smart_expense_tracker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: